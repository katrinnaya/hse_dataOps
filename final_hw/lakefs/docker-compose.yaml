version: '3.8'
services:
  lakefs_db:
    image: postgres:15
    environment:
      POSTGRES_USER: lakefs
      POSTGRES_PASSWORD: lakefs_password
      POSTGRES_DB: lakefs
    volumes:
      - pgdata_lakefs:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakefs"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  lakefs:
    image: treeverse/lakefs:latest
    depends_on:
      lakefs_db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      LAKEFS_DATABASE_URL: ${LAKEFS_DATABASE_URL}
      LAKEFS_S3_ENDPOINT_URL: ${LAKEFS_S3_ENDPOINT_URL}
      LAKEFS_AUTH_ENCRYPT_SECRET_KEY: ${LAKEFS_AUTH_ENCRYPT_SECRET_KEY}
      LAKEFS_CREDENTIALS_ACCESS_KEY_ID: ${LAKEFS_CREDENTIALS_ACCESS_KEY_ID}
      LAKEFS_CREDENTIALS_SECRET_ACCESS_KEY: ${LAKEFS_CREDENTIALS_SECRET_ACCESS_KEY}
    ports:
      - "8000:8000"
    command: run

volumes:
  pgdata_lakefs:
  minio_data:
